# ============================================================
# 图表视觉风格配置
# ============================================================
# 核心原则：优先继承用户导入的原始图表风格。
# Agent 在首次处理用户导入的图表时，应分析其风格并自动填充此文件。
# Agent 在生成图表时必须读取此配置。

source_style:
  inherited_from: "data/raw/paper/fig/"   # 原始投稿论文的图表目录
  analysis_notes: |
    原始论文（ASE 2026投稿）采用ACM sigconf双栏格式，图表风格特征：
    - 颜色方案：以蓝色系为主色，辅以橙/绿/红作对比色，整体色调沉稳
    - 字体：Times New Roman / serif，与ACM正文一致
    - 图表格式：PDF矢量图为主，部分PNG（pipeline生成的分析图）
    - 图宽：单栏3.33in（ACM sigconf），毕业论文改为单栏全宽~6.0in
    - 箱线图/小提琴图/热力图/雷达图/散点图/柱状图等多种图型
    - 三线表（无竖线），顶线底线粗，栏目线细
    - 毕业论文需适配同济大学模版：宋体题注、五号字、按章编号（图X-Y）

colors:
  palette: ["#1f77b4", "#ff7f0e", "#2ca02c", "#d62728", "#9467bd",
            "#8c564b", "#e377c2", "#7f7f7f", "#bcbd22", "#17becf"]
  background: "white"
  grid_color: "#e0e0e0"
  offensive_color: "#d62728"     # 攻击性行为用红色系
  defensive_color: "#1f77b4"     # 防御性行为用蓝色系
  benign_color: "#2ca02c"        # 良性样本用绿色系
  malicious_color: "#d62728"     # 恶意样本用红色系

fonts:
  family: "serif"                # Times New Roman / 宋体（中文）
  title_size: 12
  label_size: 11
  tick_size: 10
  legend_size: 10
  caption_size: 10.5             # 五号字（同济规范）

layout:
  dpi: 300
  single_column_width: 6.0      # 英寸（学位论文单栏全宽）
  double_column_width: 6.0      # 学位论文不分栏
  default_format: "pdf"         # pdf 矢量图优先
  grid_visible: false
  spine_visible: ["bottom", "left"]

table_style:
  format: "three-line"           # 三线表
  header_bold: true
  best_value: "bold"             # 最优值加粗
  second_best: "underline"       # 次优值下划线
  caption_position: "above"      # 表标题在表格上方
  numbering: "by-chapter"        # 按章编号：表X-Y
  ablation_delta: true           # 消融表格标注 ΔF1/Δ指标绝对值变化
  comparison_baselines: true     # 对比表格必须包含基线+本方法+变体
  no_vertical_lines: true        # 严禁纵向分界线

figure_numbering: "by-chapter"   # 按章编号：图X-Y
