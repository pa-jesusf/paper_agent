# ============================================================
# 论文元配置 — Paper Agent 全局设置
# ============================================================
# 此文件由 `初始化` 命令交互式填充，也可手动编辑。
# Agent 在任何写作任务前必须读取此文件。

# 论文基本信息
title: "基于行为语义和家族分析的恶意软件识别"
authors:
  - name: "（待填写）"
    affiliation: "同济大学软件学院"
    email: ""
venue: "硕士学位论文"              # 同济大学软件学院硕士学位论文
language: "chinese"              # 撰写语言（chinese | english）
page_limit: null                 # 学位论文无页数限制

# 多语言设置
i18n:
  primary: "chinese"             # 主要撰写语言
  secondary: "english"           # 辅助语言（摘要双语、术语原文标注等）
  abstract_bilingual: true       # 是否生成中英双语摘要
  term_original_annotation: true # 首次出现术语时附注英文原文

# 写作风格
style:
  tone: "formal-academic"        # formal-academic | technical-concise | expository
  person: "third-person"         # 同济学位论文要求：使用"本文"、"本章"等客观表述，禁止"我/我们"
  tense: "present"              # 方法/结果描述的默认时态
  paragraph_style: "topic-sentence-first"  # 每段首句概括观点

# LaTeX 编译
latex:
  compiler: "xelatex"           # 使用 xelatex 以支持中文
  bibliography: "bibtex"        # bibtex | biber
  template: "tongji-thesis"      # 同济大学硕士学位论文模版
  cjk_package: "ctex"           # 中文支持宏包

# 论文元信息
meta:
  degree: "硕士"
  discipline: "软件工程"
  university: "同济大学"
  school: "软件学院"
  defense_year: 2026
  keywords_zh:
    - "恶意软件识别"
    - "行为语义"
    - "家族分析"
    - "勒索软件"
    - "图神经网络"
    - "大语言模型"
  keywords_en:
    - "Malware Detection"
    - "Behavioral Semantics"
    - "Family Analysis"
    - "Ransomware"
    - "Graph Neural Network"
    - "Large Language Model"

# 参考文献要求
references:
  min_count: 60                  # 硕士论文参考文献不少于60篇
  foreign_ratio: 0.40            # 外文文献占比不低于40%
  format: "GB/T 7714-2015"       # 顺序编码制
  require_recent: true           # 必须包含近三年顶级会议/期刊
  require_classic: true          # 必须涵盖经典文献

# 后置部分结构
back_matter:
  acknowledgment:
    structure:                   # 致谢情感递进结构
      - "导师致谢（庄重）：选题指导、治学态度"
      - "团队致谢（务实）：同门实验与论文讨论"
      - "资助致谢（严谨）：科研基金项目编号"
      - "家人致谢（温情）：默默付出与精神后盾"
  resume:
    sections:                    # 个人简历模块化
      - "教育背景"
      - "已发表/投稿论文（标注排名及收录级别）"
      - "专利"
      - "参与项目"
  appendices:
    - "附录A：知识库完整条目表"
    - "附录B：13个开源加密库算法覆盖矩阵"
    - "附录C：检测覆盖率Venn图"

# 核心投稿论文（本毕业论文基于此论文扩展）
source_paper:
  title: "Mind the Blind Spots: Proactively Detecting Dormant Ransomware via Statically-Extracted Offensive and Defensive Actions"
  venue: "ASE 2026 (投稿中)"
  tool_name: "PolarCatch"
  data_path: "data/raw/paper/"
