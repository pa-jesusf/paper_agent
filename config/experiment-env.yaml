# ============================================================
# 实验环境描述
# ============================================================
# Agent 在撰写实验部分时必须引用此文件中的信息。
# 由 `初始化` 命令交互式填充（可从 requirements.txt 等自动推断）。

hardware:
  gpu: "NVIDIA GeForce RTX 5090 32GB"
  cpu: "13th Gen Intel Core i7-13700KF"
  memory: "32 GB"

software:
  os: "Microsoft Windows 11 专业版"
  python: "3.10.19 (conda activate ccs2025_1)"
  conda_env: "ccs2025_1"
  key_libraries:
    - {name: "torch", version: "2.11.0.dev20251224+cu130"}
    - {name: "torch-geometric", version: "2.7.0"}
    - {name: "transformers", version: "4.46.3"}
    - {name: "numpy", version: "2.2.6"}
    - {name: "pandas", version: "2.3.3"}
    - {name: "scikit-learn", version: "1.7.2"}
    - {name: "scipy", version: "1.15.3"}
    - {name: "matplotlib", version: "3.10.8"}
    - {name: "seaborn", version: "0.13.2"}
    - {name: "networkx", version: "3.4.2"}
    - {name: "optuna", version: "4.6.0"}
    - {name: "openai", version: "2.14.0"}
    - {name: "capstone", version: "5.0.6"}
    - {name: "pyyaml", version: "6.0.2"}
  analysis_tools:
    - {name: "IDA Pro", version: "8.x", purpose: "反编译与函数调用图提取"}
    - {name: "GPT-4o", version: "2026-01", purpose: "LLM行为语义识别（SLEI/SEFEI/CAR）"}

training:
  total_time: "~2 hours (GNN训练), ~48 hours (LLM特征提取全量样本)"
  batch_size: 32
  optimizer: "Adam"
  learning_rate: 1.0e-3
  epochs: 350  # Phase1: 50 预训练 + Phase2: 300 联合微调
  extra:
    gnn_architecture: "GraphSAGE"
    gnn_hidden_dim: 32
    gnn_output_dim: 16
    gnn_layers: 4
    dropout: 0.2
    classification_threshold: 0.23
    seed: 44
    pos_weight: 3.5
    loss_function: "Focal Loss"
    scheduler: "CosineAnnealingLR"
