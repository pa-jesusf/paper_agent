# 数学符号 — 与 preamble.tex 中的 \newcommand 对应
symbols:
  - name: "knowledge base (full)"
    chinese: "知识库（三层）"
    latex_macro: "\\mathbb{K}"
    definition: "\\mathbb{K} = \\{\\mathbb{K}_{lex}, \\mathbb{K}_{sem}, \\mathbb{K}_{sta}\\}"
    description: "三层恶意软件攻防行为知识库"

  - name: "lexical knowledge layer"
    chinese: "词法知识层"
    latex_macro: "\\mathbb{K}_{lex}"
    definition: "\\mathbb{K}_{lex}"
    description: "词法知识层（712条规则，含API/常量/字符串）"

  - name: "semantic knowledge layer"
    chinese: "语义知识层"
    latex_macro: "\\mathbb{K}_{sem}"
    definition: "\\mathbb{K}_{sem}"
    description: "语义知识层（204条规则，186个标注加密函数，覆盖13个开源加密库）"

  - name: "statistical knowledge layer"
    chinese: "统计知识层"
    latex_macro: "\\mathbb{K}_{sta}"
    definition: "\\mathbb{K}_{sta}"
    description: "统计知识层（57维特征向量）"

  - name: "offensive action set"
    chinese: "攻击性行为集"
    latex_macro: "A_{off}"
    definition: "A_{off}"
    description: "攻击性行为集合（加密、文件系统访问、通知窗口）"

  - name: "defensive action set"
    chinese: "防御性行为集"
    latex_macro: "A_{def}"
    definition: "A_{def}"
    description: "防御性行为集合（混淆、环境检查、延迟执行、系统破坏）"

  - name: "eta squared"
    chinese: "eta平方效应量"
    latex_macro: "\\eta^2"
    definition: "\\eta^2"
    description: "Kruskal-Wallis检验的效应量指标，>0.14为大效应"

  - name: "F1 score"
    chinese: "F1分数"
    latex_macro: "F_1"
    definition: "F_1 = \\frac{2 \\cdot P \\cdot R}{P + R}"
    description: "精确率与召回率的调和均值"

  # --- 以下为第二轮核对补充：论文核心公式符号 ---

  # 二进制表示
  - name: "decompiled binary"
    chinese: "反编译二进制"
    latex_macro: "\\langle B_C, B_F \\rangle"
    definition: "\\langle B_C, B_F \\rangle"
    description: "反编译后的二进制表示，B_C 为全局常量集合，B_F 为反编译函数集合"

  - name: "global constants"
    chinese: "全局常量集合"
    latex_macro: "B_C"
    definition: "B_C"
    description: "二进制文件中提取的全局常量集合"

  - name: "decompiled functions"
    chinese: "反编译函数集合"
    latex_macro: "B_F"
    definition: "B_F"
    description: "二进制文件中提取的所有反编译函数"

  - name: "candidate functions"
    chinese: "候选函数集合"
    latex_macro: "B_F^{\\prime}"
    definition: "B_F^{\\prime}"
    description: "SEFEI阶段经嵌入筛选的Top-k候选加密函数"

  # 证据表示
  - name: "evidence collection"
    chinese: "证据集合"
    latex_macro: "\\mathbf{E}"
    definition: "\\mathbf{E}"
    description: "样本中识别到的所有行为证据条目集合"

  - name: "evidence tuple"
    chinese: "证据元组"
    latex_macro: "\\langle func, \\langle action \\rangle, content, ele \\rangle"
    definition: "\\langle func, \\langle action \\rangle, content, ele \\rangle"
    description: "单条证据：函数名、行为类型列表、内容、知识库元素"

  # 图表示与GNN
  - name: "offensive action graph"
    chinese: "攻击性行为子图"
    latex_macro: "G_{off}"
    definition: "G_{off}"
    description: "函数调用图中标记为攻击性行为的子图（加密/文件系统/通知窗口）"

  - name: "defensive action graph"
    chinese: "防御性行为子图"
    latex_macro: "G_{def}"
    definition: "G_{def}"
    description: "函数调用图中标记为防御性行为的子图（混淆/环境检查/延迟/破坏）"

  - name: "offensive embedding"
    chinese: "攻击性图嵌入"
    latex_macro: "\\mathbf{h}_{off}"
    definition: "\\mathbf{h}_{off} = \\mathrm{READOUT}(\\mathrm{GraphSAGE}(G_{off})) \\in \\mathbb{R}^{d_h}"
    description: "Offensive GNN输出的图级嵌入向量（84维）"

  - name: "defensive embedding"
    chinese: "防御性图嵌入"
    latex_macro: "\\mathbf{h}_{def}"
    definition: "\\mathbf{h}_{def} = \\mathrm{READOUT}(\\mathrm{GraphSAGE}(G_{def})) \\in \\mathbb{R}^{d_h}"
    description: "Defensive GNN输出的图级嵌入向量（84维）"

  - name: "embedding dimension"
    chinese: "图嵌入维度"
    latex_macro: "d_h"
    definition: "d_h = 84"
    description: "graph-level嵌入维度（mean+max+add三种池化拼接，每种28维）"

  - name: "statistical feature vector"
    chinese: "统计特征向量"
    latex_macro: "\\mathbf{x}"
    definition: "\\mathbf{x} \\in \\mathbb{R}^{57}"
    description: "样本级57维统计特征向量（三层知识库提取）"

  - name: "concatenated features"
    chinese: "拼接特征向量"
    latex_macro: "\\mathbf{z}"
    definition: "\\mathbf{z} = \\mathbf{h}_{off} \\Vert \\mathbf{h}_{def} \\Vert \\mathrm{MLP}(\\mathbf{x}) \\in \\mathbb{R}^{d_z}"
    description: "三通道融合后的特征向量（84+84+128=296维）"

  - name: "concatenation dimension"
    chinese: "拼接向量总维度"
    latex_macro: "d_z"
    definition: "d_z = 296"
    description: "融合后特征总维度（84+84+128）"

  - name: "predicted output"
    chinese: "预测输出"
    latex_macro: "\\hat{\\mathbf{y}}"
    definition: "\\hat{\\mathbf{y}} = \\mathrm{softmax}(\\mathrm{MLP}(\\mathbf{z})) \\in \\mathbb{R}^{2}"
    description: "二分类预测概率分布（恶意/良性）"

  # 运算符
  - name: "concatenation operator"
    chinese: "向量拼接运算符"
    latex_macro: "\\Vert"
    definition: "\\Vert"
    description: "向量拼接运算符"

  - name: "Cohen's d"
    chinese: "Cohen's d 效应量"
    latex_macro: "d"
    definition: "d = \\frac{\\bar{x}_1 - \\bar{x}_2}{s_p}"
    description: "两组间均值差异的标准化效应量"

  - name: "Pearson correlation"
    chinese: "Pearson 相关系数"
    latex_macro: "r"
    definition: "r"
    description: "线性相关系数，用于衡量O-D极性独立性（r=0.48准正交）"

  # --- 第三轮核对补充：缺失符号 ---

  - name: "cross-entropy loss"
    chinese: "交叉熵损失"
    latex_macro: "\\mathcal{L}_{\\mathrm{CE}}"
    definition: "\\mathcal{L}_{\\mathrm{CE}}"
    description: "softmax 交叉熵损失函数（结合 Focal Loss 使用）"

  - name: "individual evidence"
    chinese: "单条证据"
    latex_macro: "e"
    definition: "e \\in \\mathbf{E}"
    description: "证据集合 E 中的单条证据条目"

  - name: "individual function"
    chinese: "单个函数"
    latex_macro: "f"
    definition: "f \\in B_F"
    description: "反编译函数集合中的单个函数"

  - name: "adjacent functions"
    chinese: "邻接函数集合"
    latex_macro: "\\langle func_{\\mathrm{adj}} \\rangle"
    definition: "\\langle func_{\\mathrm{adj}} \\rangle"
    description: "调用图中与 e.func 相邻的函数集合"

  - name: "top-n parameter"
    chinese: "Top-n 候选参数"
    latex_macro: "n"
    definition: "n = 10"
    description: "SEFEI 阶段余弦相似度筛选的 Top-n 候选函数数量"

  - name: "delta F1"
    chinese: "F1 变化量"
    latex_macro: "\\Delta F_1"
    definition: "\\Delta F_1"
    description: "消融实验中各组件移除后的 F1 变化量"
