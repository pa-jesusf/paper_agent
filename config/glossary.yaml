# ============================================================
# 术语 / 符号表 — 保证论文全局一致性
# ============================================================
# Agent 在写作时必须使用此文件中定义的统一术语和符号。
# Agent 可提议新增条目，但需经用户确认后方可写入。

# 术语统一
terms:
  - canonical: "ransomware"
    abbreviation: ""
    chinese: "勒索软件"
    first_use_zh: "勒索软件（Ransomware）"
    first_use_en: "ransomware"
