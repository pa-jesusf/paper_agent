# 数学符号 — 与 preamble.tex 中的 \newcommand 对应
symbols:
  - name: "knowledge base (full)"
    chinese: "知识库（三层）"
    latex_macro: "\\mathbb{K}"
    definition: "\\mathbb{K} = \\{\\mathbb{K}_{lex}, \\mathbb{K}_{sem}, \\mathbb{K}_{sta}\\}"
    description: "三层恶意软件攻防行为知识库"

  - name: "lexical knowledge layer"
    chinese: "词法知识层"
    latex_macro: "\\mathbb{K}_{lex}"
    definition: "\\mathbb{K}_{lex}"
    description: "词法知识层（712条规则，含API/常量/字符串）"

  - name: "semantic knowledge layer"
    chinese: "语义知识层"
    latex_macro: "\\mathbb{K}_{sem}"
    definition: "\\mathbb{K}_{sem}"
    description: "语义知识层（204条规则，186个标注加密函数，覆盖13个开源加密库）"

  - name: "statistical knowledge layer"
    chinese: "统计知识层"
    latex_macro: "\\mathbb{K}_{sta}"
    definition: "\\mathbb{K}_{sta}"
    description: "统计知识层（57维特征向量）"

  - name: "offensive action set"
    chinese: "攻击性行为集"
    latex_macro: "A_{off}"
    definition: "A_{off}"
    description: "攻击性行为集合（加密、文件系统访问、通知窗口）"

  - name: "defensive action set"
    chinese: "防御性行为集"
    latex_macro: "A_{def}"
    definition: "A_{def}"
    description: "防御性行为集合（混淆、环境检查、延迟执行、系统破坏）"

  - name: "eta squared"
    chinese: "eta平方效应量"
    latex_macro: "\\eta^2"
    definition: "\\eta^2"
    description: "Kruskal-Wallis检验的效应量指标，>0.14为大效应"

  - name: "F1 score"
    chinese: "F1分数"
    latex_macro: "F_1"
    definition: "F_1 = \\frac{2 \\cdot P \\cdot R}{P + R}"
    description: "精确率与召回率的调和均值"
